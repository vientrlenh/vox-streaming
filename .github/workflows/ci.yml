name: CI

on:
  # TEMPORARY -- testing the pipeline on testDeploy before trusting it on
  # main. Revert to `main` before merging any of this.
  pull_request:
    branches:
      - testDeploy
  push:
    branches:
      - testDeploy

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...
