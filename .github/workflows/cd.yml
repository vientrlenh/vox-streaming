name: CD

# TEMPORARY (testing): triggers directly on push to `testDeploy` (dedicated
# throwaway branch for testing this pipeline), bypassing the CI-gate entirely
# -- no workflow_run, no dependency on ci.yml. This is necessary for testing
# on a non-default branch: workflow_run only fires if the *triggering*
# workflow file (this one) already exists on the repo's default branch, which
# it doesn't yet on a feature branch -- so the CI-gated design silently never
# fires here (CI ran, CD never did -- confirmed on agents' identical setup).
# Before merging any of this to main, revert to the CI-gated design:
# `on: workflow_run: workflows: ["CI"]` + `types: [completed]` + an `if:`
# checking `github.event.workflow_run.conclusion == 'success' &&
# ...event == 'push' && ...head_branch == 'main'` (see git history for the
# exact shape) -- that gate exists so a broken build never reaches ECR/deploy.
on:
  push:
    branches:
      - testDeploy

jobs:
  docker-build-push:
    name: Build Docker image and push to ECR
    runs-on: ubuntu-latest
    outputs:
      ecr_image: ${{ steps.build_outputs.outputs.ecr_image }}
      image_tag: ${{ steps.build_outputs.outputs.image_tag }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute image tag
        id: tag
        run: echo "tag=$(echo "${{ github.sha }}" | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.tag.outputs.tag }}
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          # Layer cache keyed per-repo in GitHub Actions' own cache backend --
          # unchanged layers (e.g. `go mod download`) get reused between runs
          # instead of a full rebuild every time. `mode=max` also caches
          # intermediate build-stage layers, not just the final image.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set job outputs
        id: build_outputs
        run: |
          echo "ecr_image=${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${{ steps.tag.outputs.tag }}" >> "$GITHUB_OUTPUT"

  update-helm:
    name: Update vox-helm image tag
    runs-on: ubuntu-latest
    needs: docker-build-push
    env:
      HELM_REPO_NAME: ${{ vars.HELM_REPO_NAME }}
      HELM_REPO_OWNER: ${{ vars.HELM_REPO_OWNER || secrets.HELM_REPO_USER }}
      ECR_IMAGE: ${{ needs.docker-build-push.outputs.ecr_image }}
      IMAGE_TAG: ${{ needs.docker-build-push.outputs.image_tag }}
    steps:
      - name: Install yq
        run: |
          sudo curl -L https://github.com/mikefarah/yq/releases/download/v4.45.1/yq_linux_amd64 -o /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq

      - name: Clone Helm repository
        run: |
          git clone "https://x-access-token:${{ secrets.GITOPS_PAT }}@github.com/${HELM_REPO_OWNER}/${HELM_REPO_NAME}.git" helm-repo

      - name: Update values.yaml
        run: |
          cd helm-repo
          yq eval '.image.repository = env(ECR_IMAGE) | .image.tag = env(IMAGE_TAG)' -i charts/vox-streaming/values.yaml
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          if ! git diff --quiet; then
            git add charts/vox-streaming/values.yaml
            git commit -m "Update vox-streaming image tag to ${IMAGE_TAG}"
            git push origin HEAD:main
          fi
