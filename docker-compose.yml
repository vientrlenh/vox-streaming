# docker-compose for the vox-streaming service ONLY.
# Third-party dependencies (Redis, Kafka, MinIO/S3, coturn, the exam gRPC service)
# are expected to run elsewhere and are reached via the addresses in .env.
#
#   docker compose up -d --build      # build image + start
#   docker compose logs -f            # follow logs
#   docker compose down               # stop
#
# ---------------------------------------------------------------------------
# WEBRTC / NETWORKING NOTE (đọc kỹ):
# The service is a WebRTC endpoint. Set WEBRTC_UDP_PORT in .env so Pion muxes ALL
# peer media onto that ONE UDP port — then you only need to publish/forward it.
#
#   * bridge networking (recommended, cross-platform):  publish the TCP ports +
#     the single WEBRTC_UDP_PORT/udp, and set WEBRTC_NAT_1TO1_IP to the host's
#     reachable IP so host candidates advertise an address the browser can hit.
#     See the "bridge" block at the bottom.
#
#   * network_mode: host  ->  also fine on Linux; the container shares the host
#     stack so media + the localhost:* addresses in .env resolve directly. With
#     the UDP mux you no longer NEED host mode, but it still works.
# ---------------------------------------------------------------------------

services:
  vox-streaming:
    build:
      context: .
      dockerfile: Dockerfile
    image: vox-streaming:latest
    container_name: vox-streaming

    # Host networking: required for WebRTC UDP media. Linux only.
    network_mode: host

    # godotenv.Load() in cmd/server/main.go reads ./.env from the working dir and
    # FATALS if the file is missing. Bind-mount it (read-only) so the container
    # gets the same config without baking secrets into the image.
    volumes:
      - ./.env:/app/.env:ro
      # Isolate segment/recording temp writes from the container layer (SEGMENT_TEMP_DIR=/app/tmp).
      - vox-tmp:/app/tmp

    # Reap zombie ffmpeg subprocesses (spawned by the recorder/assembler).
    init: true

    restart: unless-stopped

    # Bound resources so a runaway assembly/ffmpeg job can't starve the host.
    # Tune to your workload; remove if you don't want limits.
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1g

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    # Liveness healthcheck is defined in the Dockerfile (hits /healthz on METRIC_ADDR).

volumes:
  vox-tmp:

# ===========================================================================
# BRIDGE ALTERNATIVE (cross-platform, with the single-UDP-port mux)
# ---------------------------------------------------------------------------
# Replace the block above with the one below to run on a bridge network. In .env:
#   WEBRTC_UDP_PORT=50000                # mux all media onto this one UDP port
#   WEBRTC_NAT_1TO1_IP=<host public IP>  # advertise a browser-reachable host IP
# and point the localhost:* deps at reachable hosts, e.g.
#   REDIS_ADDR=host.docker.internal:6379, KAFKA_BROKERS=host.docker.internal:9094.
# (A TURN server is only needed if the browser still can't reach WEBRTC_NAT_1TO1_IP.)
#
#   vox-streaming:
#     build:
#       context: .
#       dockerfile: Dockerfile
#     image: vox-streaming:latest
#     container_name: vox-streaming
#     ports:
#       - "8082:8082"          # HTTP / WebSocket signaling  (WEBRTC_ADDR)
#       - "9096:9096"          # gRPC alert ingest           (GRPC_ADDR)
#       - "9090:9090"          # metrics + health            (METRIC_ADDR)
#       - "50000:50000/udp"    # WebRTC media mux            (WEBRTC_UDP_PORT)
#     extra_hosts:
#       - "host.docker.internal:host-gateway"   # let the container reach host services
#     volumes:
#       - ./.env:/app/.env:ro
#       - vox-tmp:/app/tmp
#     init: true
#     restart: unless-stopped
#     logging:
#       driver: json-file
#       options:
#         max-size: "10m"
#         max-file: "3"
# ===========================================================================
