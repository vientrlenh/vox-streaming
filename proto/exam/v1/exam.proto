syntax = "proto3";

package exam.v1;

option go_package = "pkg/pb/exam/v1;examv1";

service ExamService {
    rpc ValidateAccess(ValidateAccessRequest) returns (ValidateAccessResponse);
    rpc UpdateRecording(UpdateRecordingRequest) returns (UpdateRecordingResponse);
}

message ValidateAccessRequest {
    string scheduleId = 1;
    string participantId = 2;
    string streamType = 3;
}

message ValidateAccessResponse {
    bool allowed = 1;
    string reason = 2;
}

message UpdateRecordingRequest {
    string streamId = 1;
    string scheduleId = 2;
    string recordingUrl = 3;
    int64 durationSecs = 4;
}

message UpdateRecordingResponse {
    bool success = 1;
}